name: Dask Worker Docker

on:
  - push
  - pull_request

jobs:

  build:

    runs-on: ubuntu-latest

    env:
      release: "2022.12.0"
      defaultpython: "3.10"

    strategy:
      fail-fast: false
      matrix:
        python: ["3.8", "3.9", "3.10"]
        image:
          - tag: "ghcr.io/tgsai/mdio"
            context: "./docker"

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
        with:
          driver: docker

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: tags
        env:
          image: ${{ matrix.image.tag }}
          python: ${{ matrix.python }}
          stable: ${{ startsWith(github.ref, 'refs/tags') }}
        run: |
          if [ "$stable" == "true" ]; then
            tag="${image}:${release}-py${python}"
            tags=${image}:latest-py${python},$tag
            if [ "$python" == "$defaultpython" ]; then
              tags=${image}:latest,${image}:${release},$tags
            fi
          else
            tag="${image}:dev-py${python}"
            tags=$tag
            if [ "$python" == "$defaultpython" ]; then
              tags=${image}:dev,$tags
            fi
          fi
          echo "::set-output name=tags::${tags}"
          echo "::set-output name=tag::${tag}"

      - name: Build and push
        uses: docker/build-push-action@v2
        with:
          context: ${{ matrix.image.context }}
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
          file: docker/dask-worker-gcp.Dockerfile
          build-args: |
            python=${{ matrix.python }}
            dask=${{ env.release }}

      - name: Report
        run: echo Built ${{ steps.tags.outputs.tags }}